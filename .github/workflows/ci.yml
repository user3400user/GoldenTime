name: CI

# Lean CI-Gate (DoD §9.5) für die GoldenTime-Pipeline. Lint (ruff) + Typen (mypy, lenient) +
# Tests (unittest) + Coverage. Bewusst OHNE open-mastr: die Query-/Diff-/QA-/Portal-Logik + alle
# Tests laufen stdlib-only (CLAUDE.md) — der schwere Export-Adapter wird in CI nicht gebraucht.

on:
  push:
    branches: [main, loop-engineering]
  pull_request:

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GoldenTime/02_Daten
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools (stdlib-only Tests brauchen kein open-mastr)
        run: python -m pip install --upgrade pip ruff mypy coverage

      - name: Ruff (Lint)
        run: ruff check pipeline/

      - name: Mypy (Typen, lenient)
        run: mypy pipeline/

      - name: Tests + Coverage
        run: |
          coverage run -m unittest discover -s pipeline/tests -p "test_*.py"
          coverage report --fail-under=70
